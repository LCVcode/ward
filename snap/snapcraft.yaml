name: ward
summary: Infrastructure coordinator for Canonical Workshop VMs and OpenCode agents
description: |
  ward manages the lifecycle of Canonical Workshop VMs (LXD containers) and
  orchestrates OpenCode AI agent execution within per-project sandboxes.

  Run 'ward init' inside a Git repository to provision a workshop.yaml
  blueprint and seed AGENTS.md for version-controlled AI context memory.
  Run 'ward up' to launch a pre-authenticated, isolated OpenCode session.

  ward requires Canonical Workshop and OpenCode to be installed on the host.
  Install Workshop via: sudo snap install workshop

# Version is adopted from pyproject.toml at build time (see the ward part's
# override-pull below), keeping a single source of truth for the version.
adopt-info: ward
base: core24
grade: devel
# ward is a host orchestrator: it execs other host/snap binaries (workshop,
# opencode) and operates on arbitrary project directories. Strict confinement
# cannot do that, so classic confinement is required.
confinement: classic

platforms:
  amd64:

apps:
  ward:
    command: bin/ward
    environment:
      # The plugin rewrites the entry-point shebang to "#!/usr/bin/env
      # python3". Prepend the venv's bin so it resolves to the bundled
      # interpreter ($SNAP/bin/python3 -> usr/bin/python3.12) instead of the
      # host's python3. The host PATH is preserved (appended), so ward can
      # still locate the host 'workshop' and 'opencode' binaries.
      PATH: $SNAP/bin:$PATH

parts:
  ward:
    plugin: python
    source: .
    # Classic snaps cannot use the base snap's Python interpreter, so the
    # interpreter AND the standard library must be bundled in the payload.
    # The python plugin builds a virtualenv and finds the staged interpreter
    # automatically; the venv's pyvenv.cfg is repointed at the bundled
    # interpreter in override-build below (the plugin leaves it at /usr/bin).
    stage-packages:
      - python3.12-minimal      # /usr/bin/python3.12 + minimal runtime
      - libpython3.12-minimal   # core stdlib (encodings, codecs, ...)
      - libpython3.12-stdlib    # full stdlib + lib-dynload C-extensions
    # The bundled python3.12 is built against core24's glibc (2.39). Under
    # classic confinement the snap runs against host libraries, so the ELF
    # interpreter/rpath must be patched to the core24 base
    # (/snap/core24/current/...) to remain portable to older hosts.
    build-attributes:
      - enable-patchelf
    # Derive the snap version from pyproject.toml's [project] version.
    override-pull: |
      craftctl default
      craftctl set version="$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)"
    # Run the plugin's normal build (creates the venv + installs ward), then
    # repoint pyvenv.cfg at the bundled interpreter. The plugin builds the venv
    # with the build host's python3, leaving home=/usr/bin (correct for strict
    # snaps that use the base's Python, wrong for classic). Fixing it here in
    # the build step (rather than override-prime) keeps the enable-patchelf
    # prime step intact. At runtime this makes the venv resolve the bundled
    # stdlib (via home) and ward's site-packages (via the venv prefix).
    override-build: |
      craftctl default
      sed -i \
        -e 's|^home = .*|home = /snap/ward/current/usr/bin|' \
        -e 's|^executable = .*|executable = /snap/ward/current/usr/bin/python3.12|' \
        -e '/^command = /d' \
        "${CRAFT_PART_INSTALL}/pyvenv.cfg"
