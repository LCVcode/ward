name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded in-progress runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --extra dev

      # Single command runs ruff (lint), ruff-format (check), ty, and the
      # hygiene hooks — the exact set developers run locally via pre-commit.
      - name: Run pre-commit (ruff + ty + hygiene)
        run: uv run pre-commit run --all-files --show-diff-on-failure

  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run pytest
        run: uv run pytest
